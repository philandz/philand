name: philand-ci

on:
  push:
    branches: [ "main","sandbox" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Meta
        id: meta
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login Harbor
        run: |
          echo "${{ secrets.HARBOR_PASS }}" | docker login ${{ secrets.HARBOR_HOST }} \
            -u "${{ secrets.HARBOR_USER }}" --password-stdin

      - name: Build & Push API
        run: |
          IMG="${{ secrets.HARBOR_HOST }}/philand/api:${{ steps.meta.outputs.TAG }}"
          docker build -t "$IMG" -f Dockerfile .
          docker push "$IMG"

      - name: Build & Push WEB
        run: |
          IMG="${{ secrets.HARBOR_HOST }}/philand/web:${{ steps.meta.outputs.TAG }}"
          docker build -t "$IMG" -f web/Dockerfile web
          docker push "$IMG"