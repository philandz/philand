<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philand API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.10.5/swagger-ui.css" />
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }
        
        body {
            margin: 0;
            background: #fafafa;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .swagger-ui .topbar {
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
        }
        
        .swagger-ui .topbar .download-url-wrapper {
            display: none;
        }
        
        .swagger-ui .info {
            margin: 50px 0;
        }
        
        .swagger-ui .info .title {
            color: #1e293b;
            font-size: 36px;
            font-weight: 800;
        }
        
        .swagger-ui .info .description {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .swagger-ui .opblock {
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        
        .swagger-ui .opblock.opblock-get {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        
        .swagger-ui .opblock.opblock-post {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        
        .swagger-ui .opblock.opblock-patch {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }
        
        .swagger-ui .opblock.opblock-delete {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }
        
        .swagger-ui .opblock-summary-method {
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            padding: 6px 12px;
            min-width: 80px;
            text-align: center;
        }
        
        .swagger-ui .opblock-get .opblock-summary-method {
            background: #10b981;
            color: white;
        }
        
        .swagger-ui .opblock-post .opblock-summary-method {
            background: #3b82f6;
            color: white;
        }
        
        .swagger-ui .opblock-patch .opblock-summary-method {
            background: #f59e0b;
            color: white;
        }
        
        .swagger-ui .opblock-delete .opblock-summary-method {
            background: #ef4444;
            color: white;
        }
        
        .swagger-ui .opblock-summary-path {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .swagger-ui .opblock-tag {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin: 40px 0 20px 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        
        .swagger-ui .btn.execute {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        
        .swagger-ui .btn.execute:hover {
            background: #2563eb;
            border-color: #2563eb;
        }
        
        /* Custom header */
        .api-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .api-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
        }
        
        .api-header p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
            line-height: 1.6;
        }
        
        .env-badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 12px;
        }
        
        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div class="api-header">
        <h1>
            Philand API Documentation
            <span class="env-badge">Dev</span>
        </h1>
        <p>
            Comprehensive REST API for budget tracking and financial management
        </p>
    </div>
    
    <div id="swagger-ui"></div>
    
    <script src="https://unpkg.com/swagger-ui-dist@5.10.5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.10.5/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                url: '/api/openapi.json',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                docExpansion: "list",
                defaultModelsExpandDepth: 2,
                defaultModelExpandDepth: 2,
                displayOperationId: false,
                displayRequestDuration: true,
                filter: true,
                showExtensions: true,
                showCommonExtensions: true,
                tryItOutEnabled: true,
                requestInterceptor: function(request) {
                    // Add development server URL if not already present
                    if (!request.url.startsWith('http')) {
                        request.url = window.location.origin + request.url;
                    }
                    return request;
                }
            });
        };
    </script>
</body>
</html>
